version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - multienv-network

  backend-dev:
    build:
      context: ./backend/dev
      dockerfile: Dockerfile
    container_name: backend-dev
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017/devdb
    ports:
      - "3001:3001"
    networks:
      - multienv-network

  backend-prod:
    build:
      context: ./backend/prod
      dockerfile: Dockerfile
    container_name: backend-prod
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017/proddb
    ports:
      - "3002:3001"
    networks:
      - multienv-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - backend-dev
      - backend-prod
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true
    networks:
      - multienv-network

volumes:
  mongodb_data:

networks:
  multienv-network:
    driver: bridge